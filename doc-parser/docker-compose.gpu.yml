version: "3.9"

services:
  doc-parser-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_TYPE=local
      - STORAGE_PATH=/data/jobs
      - SERVICE_BASE_URL=http://doc-parser-api:8100
      - WORKER_MODE=true
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ./data:/data
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      -Q parse
      -c 1
