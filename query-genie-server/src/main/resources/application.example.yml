app:
  search:
    embedding-cache:
      enabled: true
      ttl-ms: 15000
  chunk:
    size: 500
    max-size: 1000
    overlap: 100
  rerank:
    enabled: true
    model: gte-rerank-v2
    candidate-factor: 2
  qa:
    enabled: true
    size: 10
    rerank: true
    max-context-chars: 6000
    max-history-turns: 10
    summarize-when-turns-over: 6
    max-total-history-chars: 0
    search:
      max-es-queries-per-ask: 8
      short-query-char-threshold: 8
      short-query-keyword-first: true
      keyword-upgrade-top1-threshold: 7.0
      keyword-upgrade-min-hits: 2
      rerank-uncertainty-gap-threshold: 0.6
      rerank-gap-compare-k: 5
      rerank-long-query-char-threshold: 32
      rerank-prefilter-score-threshold: 4.0
      rerank-prefilter-max-chunks-per-doc: 2
    sessions:
      list-limit: 100
  query-rewrite:
    enabled: true
    default-total-queries: 4
    max-total-queries: 8
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      model: ${OPENAI_MODEL:qwen2.5-7b-instruct-1m}
      temperature: ${OPENAI_TEMPERATURE:0.3}
      timeout-ms: ${OPENAI_TIMEOUT_MS:10000}

spring:
  application:
    name: genie-query-server
  ai:
    model:
      embedding: dashscope
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 768
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7
          max-tokens: 2000
  main:
    allow-bean-definition-overriding: true
    banner-mode: console
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
      enabled: true
      location: /tmp
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/genie?rewriteBatchedStatements=true&useUnicode=true&amp&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&zeroDateTimeBehavior=CONVERT_TO_NULL&sessionVariables=group_concat_max_len=204800
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driverClassName: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    initial-size: 5
    min-idle: 10
    max-active: 500
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:123456}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

server:
  port: 8090
  servlet:
    context-path: /genie/api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    min-spare-threads: 10
    connection-timeout: 5000ms
    max-connections: 10000
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/json,application/javascript
    min-response-size: 1024

redisson:
  single-server-config:
    address: "redis://${spring.data.redis.host}:${spring.data.redis.port}"
    password: ${spring.data.redis.password}
    database: ${spring.data.redis.database}
    connection-pool-size: ${spring.data.redis.lettuce.pool.max-active}
    connection-minimum-idle-size: ${spring.data.redis.lettuce.pool.min-idle}
    subscription-connection-pool-size: 50
    client-name: ${spring.application.name}

cors:
  allowed-origins: "*"
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

logging:
  level:
    "[com.genie.query.infrastructure.dao.mysql.mapper]": debug
    "[org.apache.ibatis]": debug
    "[org.mybatis.spring]": debug

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-handlers-package: com.genie.query.infrastructure.handle.typehandle
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

elasticsearch:
  host: ${ELASTICSEARCH_HOST:http://localhost:9200}
